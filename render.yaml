services:
  - type: web
    name: clinical-opd-api
    env: docker
    dockerContext: .
    dockerfilePath: app/backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinical-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clinical-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AI_API_KEY
        sync: false

  - type: redis
    name: clinical-cache
    plan: free
    ipAllowList: [] # Only allow internal traffic

databases:
  - name: clinical-db
    plan: free
    postgresMajorVersion: 16
