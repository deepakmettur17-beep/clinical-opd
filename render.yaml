services:
  - type: web
    name: clinical-opd-system
    runtime: node
    plan: free
    buildCommand: npm run install-all && npm run build-frontend
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 5000
